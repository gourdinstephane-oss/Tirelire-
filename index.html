<!DOCTYPE html>
<html lang="fr">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tirelire</title>
<meta name="theme-color" content="#f6f1e4">
<link rel="manifest" href="manifest.json">
<style>
  body { font-family: system-ui; max-width: 320px; margin: 20px auto; padding: 10px; background: #f6f1e4; color: #132a22; }
  .jar { height: 80px; border: 2px solid #1b3a2f; background: rgba(27,58,47,.1); display: flex; align-items: flex-end; }
  .fill { width: 100%; background: #c9a227; transition: .3s; }
  .tot { font-size: 2.5em; font-weight: bold; color: #1b3a2f; margin: 10px 0; }
  .row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #ccc; }
  button, input { padding: 8px; font: inherit; }
</style>

<h2>Tirelire</h2>
<div class="jar"><div id="fill" class="fill"></div></div>
<div id="tot" class="tot">0,00 €</div>

<input id="inp" placeholder="Ex: 12,50">
<button onclick="add()">Ajouter</button>

<div id="list" style="margin-top:15px"></div>
<p><button onclick="entries=[];render()">RAZ</button></p>

<script>
let entries = JSON.parse(localStorage.getItem('entries') || '[]');
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js');

const diff = a => Math.round((Math.floor(a) + 1 - a) * 100) / 100;
const fmt = n => n.toFixed(2).replace('.', ',') + ' €';

function render() {
  list.innerHTML = entries.map((a, i) => `
    <div class="row">
      <span>${fmt(a)}</span>
      <span>+${fmt(diff(a))}</span>
      <button onclick="entries.splice(${i},1);render()">✕</button>
    </div>`).join('');
  
  const sum = entries.reduce((s, a) => s + diff(a), 0);
  tot.textContent = fmt(sum);
  fill.style.height = (entries.length ? Math.min(100, (sum / 20) * 100) : 0) + '%';
  localStorage.setItem('entries', JSON.stringify(entries));
}

function add() {
  const v = parseFloat(inp.value.replace(',', '.'));
  if (v > 0) { entries.push(v); inp.value = ''; render(); }
}

inp.onkeydown = e => e.key === 'Enter' && add();
render();
</script>
