<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tirelire — Arrondi</title>

<!-- Configuration PWA -->
<meta name="theme-color" content="#1b3a2f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tirelire">

<!-- Manifest PWA intégré directement en Data URI -->
<link rel="manifest" href='data:application/manifest+json,{
  "name": "Tirelire d&#39;arrondi",
  "short_name": "Tirelire",
  "start_url": ".",
  "display": "standalone",
  "background_color": "#f6f1e4",
  "theme_color": "#1b3a2f",
  "icons": [
    {
      "src": "data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>",
      "sizes": "192x192 512x512",
      "type": "image/svg+xml",
      "purpose": "any maskable"
    }
  ]
}'>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --ink:#132a22;
    --jar-green:#1b3a2f;
    --jar-green-light:#2b5142;
    --gold:#c9a227;
    --gold-light:#e6c65c;
    --cream:#f6f1e4;
    --copper:#a85c32;
    --line: rgba(19,42,34,0.12);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

  html,body{
    margin:0; padding:0;
    background: var(--cream);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    min-height:100vh;
  }

  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 28px 18px 40px;
  }

  .wrap{
    width:100%;
    max-width: 420px;
  }

  .eyebrow{
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--copper);
    text-align:center;
    margin-bottom: 6px;
    font-weight: 700;
  }

  h1{
    font-family: 'Fraunces', serif;
    font-optical-sizing: auto;
    font-weight: 600;
    font-size: 30px;
    text-align: center;
    margin: 0 0 22px;
    color: var(--jar-green);
    letter-spacing: -0.01em;
  }

  /* --- Signature element: the jar --- */
  .jar-stage{
    position: relative;
    width: 168px;
    height: 190px;
    margin: 0 auto 22px;
  }
  .jar-body{
    position:absolute;
    left:50%; top: 18px;
    transform: translateX(-50%);
    width: 140px; height: 160px;
    border-radius: 14px 14px 22px 22px;
    background: linear-gradient(180deg, rgba(27,58,47,0.06), rgba(27,58,47,0.11));
    border: 3px solid var(--jar-green);
    overflow: hidden;
  }
  .jar-fill{
    position:absolute;
    left:0; right:0; bottom:0;
    height: 8%;
    background: linear-gradient(180deg, var(--gold-light), var(--gold));
    transition: height 0.6s cubic-bezier(.2,.9,.25,1);
  }
  .jar-fill::before{
    content:'';
    position:absolute; top:-6px; left:0; right:0; height:12px;
    background: repeating-linear-gradient(90deg, var(--gold-light) 0 10px, var(--gold) 10px 20px);
    opacity:0.6;
  }
  .jar-neck{
    position:absolute; left:50%; top:0;
    transform: translateX(-50%);
    width: 62px; height: 22px;
    border: 3px solid var(--jar-green);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    background: var(--cream);
  }
  .jar-lid{
    position:absolute; left:50%; top:-8px;
    transform: translateX(-50%);
    width: 76px; height: 12px;
    border-radius: 6px;
    background: var(--jar-green);
  }

  .result-label{
    text-align:center;
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--jar-green-light);
    font-weight: 500;
    margin-bottom: 2px;
  }
  .result{
    font-family: 'Fraunces', serif;
    font-weight: 700;
    font-size: 52px;
    text-align:center;
    color: var(--jar-green);
    margin-bottom: 28px;
    font-variant-numeric: tabular-nums;
    letter-spacing: -0.02em;
  }

  .entry-form{
    display:flex;
    gap: 8px;
    margin-bottom: 18px;
  }
  .entry-form input{
    flex:1;
    font-family: 'JetBrains Mono', monospace;
    font-size: 17px;
    padding: 13px 14px;
    border-radius: 10px;
    border: 2px solid var(--line);
    background: white;
    color: var(--ink);
    outline:none;
  }
  .entry-form input:focus{
    border-color: var(--gold);
  }
  .entry-form button{
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.02em;
    padding: 13px 18px;
    border-radius: 10px;
    border: none;
    background: var(--jar-green);
    color: var(--cream);
    cursor:pointer;
  }
  .entry-form button:active{ background: var(--jar-green-light); }

  .ledger-head{
    display:flex;
    justify-content:space-between;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--copper);
    font-weight: 700;
    padding: 0 4px 6px;
    border-bottom: 1px solid var(--line);
  }

  .ledger{
    list-style:none;
    margin:0; padding:0;
    max-height: 240px;
    overflow-y:auto;
  }
  .ledger li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding: 11px 4px;
    border-bottom: 1px dashed var(--line);
    font-size: 15px;
    animation: dropIn 0.35s ease;
  }
  @keyframes dropIn{
    from{ opacity:0; transform: translateY(-6px); }
    to{ opacity:1; transform: translateY(0); }
  }
  .ledger .amt{ color: var(--ink); }
  .ledger .diff{ color: var(--copper); font-weight:500; }
  .ledger .del{
    background:none; border:none; color: var(--line); font-size:16px;
    cursor:pointer; padding: 0 0 0 10px; line-height:1;
  }
  .ledger .del:active{ color: var(--copper); }

  .empty{
    text-align:center;
    color: var(--jar-green-light);
    font-size: 13px;
    padding: 24px 0;
    opacity: 0.7;
  }

  .reset-row{
    margin-top: 22px;
    text-align:center;
  }
  .reset{
    font-family:'JetBrains Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    background:none;
    border: 1px solid var(--copper);
    color: var(--copper);
    padding: 10px 16px;
    border-radius: 20px;
    cursor:pointer;
  }
  .reset:active{ background: var(--copper); color: var(--cream); }

  @media (prefers-reduced-motion: reduce){
    .ledger li{ animation:none; }
    .jar-fill{ transition:none; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Chaque centime compte</div>
    <h1>Tirelire d'arrondi</h1>

    <div class="jar-stage">
      <div class="jar-lid"></div>
      <div class="jar-neck"></div>
      <div class="jar-body"><div class="jar-fill" id="jarFill"></div></div>
    </div>

    <div class="result-label">Total collecté</div>
    <div class="result" id="result">0,00 €</div>

    <div class="entry-form" id="entryForm">
      <input type="text" inputmode="decimal" id="amountInput" placeholder="Montant, ex. 12,50" autocomplete="off">
      <button type="button" id="addBtn">Ajouter</button>
    </div>

    <div class="ledger-head">
      <span>Montant</span>
      <span>Arrondi</span>
    </div>
    <ul class="ledger" id="ledger"></ul>
    <div class="empty" id="emptyMsg">La tirelire est vide pour l'instant.</div>

    <div class="reset-row">
      <button class="reset" id="resetBtn" type="button">Remettre à zéro</button>
    </div>

    <div id="storageNotice" style="display:none; text-align:center; font-size:11px; color:var(--copper); opacity:0.75; margin-top:16px;">
      Sauvegarde automatique indisponible ici — les montants resteront affichés tant que la page reste ouverte.
    </div>
  </div>

<script>
const STORAGE_KEY = 'tirelire-entries';
let entries = [];

function parseAmount(str){
  if(!str) return NaN;
  const cleaned = str.replace(/\s/g,'').replace(',', '.').replace('€','');
  return parseFloat(cleaned);
}

function roundDiff(amount){
  const diff = Math.floor(amount) + 1 - amount;
  return Math.round(diff * 100) / 100;
}

function fmt(n){
  return n.toLocaleString('fr-FR', {minimumFractionDigits:2, maximumFractionDigits:2}) + ' €';
}

function render(){
  const ledger = document.getElementById('ledger');
  const emptyMsg = document.getElementById('emptyMsg');
  ledger.innerHTML = '';

  if(entries.length === 0){
    emptyMsg.style.display = 'block';
  } else {
    emptyMsg.style.display = 'none';
    entries.forEach((amount, idx) => {
      const diff = roundDiff(amount);
      const li = document.createElement('li');
      li.innerHTML = `
        <span class="amt">${fmt(amount)}</span>
        <span class="diff">+${fmt(diff)}</span>
        <button class="del" data-idx="${idx}" aria-label="Supprimer">✕</button>
      `;
      ledger.appendChild(li);
    });
  }

  const total = entries.reduce((sum, a) => sum + roundDiff(a), 0);
  document.getElementById('result').textContent = fmt(Math.round(total*100)/100);

  const fillPct = Math.min(92, 8 + (total / (total + 15)) * 84);
  document.getElementById('jarFill').style.height = (entries.length === 0 ? 8 : fillPct) + '%';

  save();
}

function storageAvailable(){
  return typeof window !== 'undefined'
    && typeof window.storage !== 'undefined'
    && typeof window.storage.set === 'function'
    && typeof window.storage.get === 'function';
}

function localStorageAvailable(){
  try{
    const testKey = '__test__';
    window.localStorage.setItem(testKey, '1');
    window.localStorage.removeItem(testKey);
    return true;
  } catch(e){
    return false;
  }
}

function showStorageNotice(){
  const el = document.getElementById('storageNotice');
  if(el) el.style.display = 'block';
}

async function save(){
  if(localStorageAvailable()){
    try{
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      return;
    } catch(e){}
  }
  if(storageAvailable()){
    try{
      await window.storage.set(STORAGE_KEY, JSON.stringify(entries), false);
      return;
    } catch(e){}
  }
  showStorageNotice();
}

async function load(){
  if(localStorageAvailable()){
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if(raw){
      try{ entries = JSON.parse(raw); } catch(e){ entries = []; }
    }
    render();
    return;
  }
  if(storageAvailable()){
    try{
      const res = await window.storage.get(STORAGE_KEY, false);
      if(res && res.value){
        entries = JSON.parse(res.value);
      }
    } catch(e){
      entries = [];
    }
    render();
    return;
  }
  showStorageNotice();
  render();
}

function addEntry(){
  const input = document.getElementById('amountInput');
  const amount = parseAmount(input.value);
  if(isNaN(amount) || amount <= 0) {
    input.focus();
    return;
  }
  entries.push(Math.round(amount*100)/100);
  input.value = '';
  render();
  input.focus();
}

document.getElementById('addBtn').addEventListener('click', addEntry);
document.getElementById('amountInput').addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    addEntry();
  }
});

document.getElementById('ledger').addEventListener('click', (e) => {
  if(e.target.classList.contains('del')){
    const idx = parseInt(e.target.dataset.idx, 10);
    entries.splice(idx, 1);
    render();
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  entries = [];
  render();
});

load();

// --- Enregistrement du Service Worker PWA (via Data URI) ---
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    const swCode = `
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => caches.match(e.request))));
    `;
    const blob = new Blob([swCode], { type: 'text/javascript' });
    const swUrl = URL.createObjectURL(blob);
    
    navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration skipped', err));
  });
}
</script>
</body>
</html>
